<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<script>

// Arithmetic Operators
console.log("Arithmetic Operators:");
let num1 = 10;
let num2 = 5;

console.log("Addition:", num1 + num2);        // 15
console.log("Subtraction:", num1 - num2);     // 5
console.log("Multiplication:", num1 * num2);  // 50
console.log("Division:", num1 / num2);        // 2
console.log("Modulus:", num1 % num2);         // 0
console.log("Exponentiation:", num1 ** 2);    // 100
console.log("-----------------------------");

// Unary Operators
console.log("Unary Operators:");
let x = 10;

console.log("Increment (post):", x++);  // 10
console.log("Value after increment:", x); // 11
console.log("Increment (pre):", ++x);   // 12
console.log("Decrement (post):", x--);  // 12
console.log("Value after decrement:", x); // 11
console.log("Negation:", -x);           // -11
console.log("Logical NOT:", !true);     // false
console.log("-----------------------------");

// Assignment Operators
console.log("Assignment Operators:");
let a = 20;

console.log("Initial value of a:", a); // 20
a += 10;
console.log("After += 10:", a); // 30
a -= 5;
console.log("After -= 5:", a); // 25
a *= 2;
console.log("After *= 2:", a); // 50
a /= 5;
console.log("After /= 5:", a); // 10
a %= 3;
console.log("After %= 3:", a); // 1
console.log("-----------------------------");

// Comparison Operators
console.log("Comparison Operators:");
let b = 15;
let c = 20;

console.log("b == c:", b == c);   // false
console.log("b === c:", b === c); // false
console.log("b != c:", b != c);   // true
console.log("b !== c:", b !== c); // true
console.log("b > c:", b > c);     // false
console.log("b < c:", b < c);     // true
console.log("b >= 15:", b >= 15); // true
console.log("b <= 10:", b <= 10); // false
console.log("-----------------------------");

// Logical Operators
console.log("Logical Operators:");
let isTrue = true;
let isFalse = false;

console.log("AND (true && false):", isTrue && isFalse); // false
console.log("OR (true  false):", isTrue  || isFalse);  // true
console.log("NOT (!true):", !isTrue);                   // false
console.log("Combined (true && !false):", isTrue && !isFalse); // true
console.log("-----------------------------");

// If-Else and Ternary
x = 45;
y = 67;

if (x > y) {
    console.log("x is big");
} else {
    console.log("y is big");
}

a = x > y ? "x is big" : "y is big";
console.log(a);

</script>
</body>
</html>
