<!DOCTYPE html>
<html>
<head>
    <title>CSS Box Model Demo</title>

    <style>
        /* Box styling */
        .box {
            width: 300px;

            padding: 20px;          /* space inside */
            border: 5px solid blue; /* border */
            margin: 30px;           /* space outside */

            background-color: lightyellow;

            /* Text styling */
            color: darkblue;
            font-size: 18px;
            font-family: Arial;
            text-align: center;
        }
    </style>
</head>

<body>

    <h1>CSS Box Model Example</h1>

    <div class="box">
        This is a box demonstrating margin, border, padding and text styling.
    </div>

</body>
</html>
