<!DOCTYPE html>
<html>
<head>
    <title>CSS Selectors</title>

    <style>

        * {
            font-family: Arial;
        }

        h1 {
            color: blue;
        }

        .para {
            color: green;
        }

        #special {
            color: red;
        }

        h2, h3 {
            background-color: yellow;
        }

    </style>
</head>
<body>

<h1>Element Selector</h1>

<p class="para">Class Selector Example</p>

<p id="special">ID Selector Example</p>

<h2>Group Selector</h2>

<h3>Group Selector</h3>

</body>
</html>
