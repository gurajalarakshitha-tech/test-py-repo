<!DOCTYPE html>
<html lang="en">
<head>

<title>CSS BOX MODEL</title>
<style>
body {
    background-color:blueviolet;
    font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
}
#main{

    width: 900px;
}
h2{

}

</head>
<body>
    <h2>CSS Box Properties</h2>
    <div id="main">
    <h3 class="box">This is my university!!! </h3>

    ">
   </div>
