<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grid Layout</title>

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body */
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6fb;
        }

        /* GRID CONTAINER */
        .grid-container {
            display: grid;

            /* Define columns */
            grid-template-columns: 250px 1fr 200px;

            /* Define rows */
            grid-template-rows: 80px 1fr 70px;

            /* Space between items */
            gap: 15px;

            /* Full screen height */
            height: 100vh;

            padding: 15px;
        }

        /* GRID AREAS */
        .header {
            grid-column: 1 / 4;
            background: #4f46e5;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar {
            background: #6366f1;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content {
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        .extra {
            background: #818cf8;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer {
            grid-column: 1 / 4;
            background: #4f46e5;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
            }

            .header,
            .footer {
                grid-column: 1 / 2;
            }
        }
    </style>
</head>

<body>

<div class="grid-container">

    <header class="header">Header</header>

    <nav class="sidebar">Sidebar</nav>

    <main class="content">Main Content</main>

    <aside class="extra">Extra Content</aside>

    <footer class="footer">Footer</footer>

</div>

</body>
</html>
