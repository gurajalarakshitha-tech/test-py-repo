<!DOCTYPE html>
<html>
<head>
    <title>CSS Selectors Demo</title>

    <style>

        /* 1. Universal Selector */
        * {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        /* 2. Element Selector */
        h1 {
            color: blue;
            text-align: center;
        }

        p {
            margin: 10px;
            font-size: 16px;
        }

        /* 3. Class Selector */
        .highlight {
            color: green;
            font-weight: bold;
        }

        /* 4. ID Selector */
        #special {
            color: red;
            font-style: italic;
        }

        body {
            background-color: #f2f2f2;
        }

        .box {
            background-color: white;
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
        }

    </style>
</head>

<body>

    <div class="box">
        <h1>CSS Selectors Example</h1>

        <h2>Element Selector</h2>
        <p>This paragraph is styled using element selector.</p>

        <h2>Class Selector</h2>
        <p class="highlight">This paragraph uses a class selector.</p>

        <h2>ID Selector</h2>
        <p id="special">This paragraph uses an ID selector.</p>

        <h2>Universal Selector</h2>
        <p>Universal selector applies style to all elements.</p>
    </div>

</body>
</html>
